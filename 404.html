<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Dönerverbrechen nicht gefunden</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #f1f1f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            border: 2px solid #e74c3c;
            padding: 30px;
            border-radius: 15px;
            background-color: #2c2c2c;
        }
        h1 { font-size: 3rem; color: #e74c3c; margin-bottom: 10px; }
        p { font-size: 1.2rem; line-height: 1.6; }
        .sauce { color: #f1c40f; font-weight: bold; }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { background-color: #2ecc71; }
        .emoji { font-size: 5rem; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🥙❌</div>
        <h1>404 - Leerstelle im Fladenbrot</h1>
        <p>Tut mir leid, Chef! Diese Seite existiert nicht.</p>
        <p>Wahrscheinlich wurde sie mit <span class="sauce">Ketchup und Mayo</span> bestrichen und anschließend vom Internet-Gott wegen Blasphemie gelöscht.</p>
        
        <a href="/" class="btn">Zurück zum Drehspieß</a>
    </div>
</body>
</html>
