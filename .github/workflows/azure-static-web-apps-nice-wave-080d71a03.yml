name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch: # Ermöglicht den manuellen Start über den "Run workflow" Button

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Inject SAS Token
        env:
          SAS_TOKEN: ${{ secrets.AZURE_SAS_TOKEN }}
        run: |
          python3 -c "
          import os
          token = os.environ.get('SAS_TOKEN', '')
          if token.startswith('?'):
              token = token[1:]
          for filename in ['logik.js', 'profil.html']:
              if os.path.exists(filename):
                  with open(filename, 'r', encoding='utf-8') as f:
                      content = f.read()
                  new_content = content.replace('___SAS_TOKEN_PLACEHOLDER___', token)
                  with open(filename, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print(f'Processed {filename}')
          "

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_WAVE_080D71A03 }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "/"
          github_id_token: ${{ steps.idtoken.outputs.result }}
          app_build_command: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"