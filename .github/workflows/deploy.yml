name: Deploy Website to Azure

on:
  push:
    branches:
      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 1. SAS Token in die logik.js schmuggeln
    - name: Inject SAS Token
      env:
        SAS_TOKEN: ${{ secrets.AZURE_SAS_TOKEN }}
      run: |
        # Wir nutzen Python, da es keine Probleme mit Sonderzeichen wie '&' hat
        python3 -c "
        import os
        token = os.environ['SAS_TOKEN']
        for filename in ['logik.js', 'profil.html']:
            if os.path.exists(filename):
                with open(filename, 'r') as f:
                    content = f.read()
                with open(filename, 'w') as f:
                    # Ersetzt den Platzhalter sicher durch den echten Token
                    f.write(content.replace('___SAS_TOKEN_PLACEHOLDER___', token))
        "

   # 2. ALLES AUSSER dem Ordner 'beweise' in $web hochladen
    - name: Upload Website to $web
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az storage blob upload-batch \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --destination '$web' \
            --source . \
            --pattern "*" \
            --overwrite true

