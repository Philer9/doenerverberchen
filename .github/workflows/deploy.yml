name: Deploy Website to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 1. SAS Token in die logik.js schmuggeln
    - name: Inject SAS Token
      run: |

        TOKEN="${{ secrets.AZURE_SAS_TOKEN }}"
        sed -i "s#___SAS_TOKEN_PLACEHOLDER___#$TOKEN#g" logik.js
        sed -i "s#___SAS_TOKEN_PLACEHOLDER___#$TOKEN#g" profil.html

   # 2. ALLES AUSSER dem Ordner 'beweise' in $web hochladen
    - name: Upload Website to $web
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az storage blob upload-batch \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --destination '$web' \
            --source . \
            --pattern "*" \
            --overwrite true

    # 3. NUR den Inhalt des lokalen Ordners 'beweise' in den Container 'beweise' hochladen
    - name: Upload Data to beweise container
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az storage blob upload-batch \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --destination 'beweise' \
            --source ./beweise \
            --overwrite true