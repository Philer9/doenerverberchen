name: Deploy Website to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # NEU: Platzhalter durch echtes Secret ersetzen
    - name: Inject SAS Token
      run: |
        sed -i "s|___SAS_TOKEN_PLACEHOLDER___|${{ secrets.AZURE_SAS_TOKEN }}|g" logik.js

    - name: Upload to Azure Storage
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az storage blob upload-batch \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --destination '$web' \
            --source . \
            --overwrite true