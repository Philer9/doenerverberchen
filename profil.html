<script>
// 1. Die verifizierten Hash-Werte (Passwörter)
const passwordHashes = {
    0: "266497274070a98f9d0c6407f3542289c381665a587440660f545465e6383a1b", // petersilie
    1: "7514b4a1337d13d6cda65fe3d5bd1d476340c766666bea6fda9a6a9cd272accd", // erdnuss
    2: "02c3859663e26087b3e0c077b96e5d898517228a4788390b106263546a16174a", // zitronengras
    3: "6784d852ca2e6e3c08003117462c19e59275a596167823b16027376c962b3c22", // curry
    4: "0e2f5b3a4a75368a5202613589c368686e921d0092305cfcf8d63f0a3597816d"  // tofu
};

const params = new URLSearchParams(window.location.search);
const pIdx = parseInt(params.get('id') || "0");
const personenNamen = ["Person 1", "Person 2", "Person 3", "Person 4", "Person 5"];
document.getElementById('user-name').innerText = "Akte: " + personenNamen[pIdx];

// 2. Hilfsfunktionen
async function getHash(str) {
    const msgUint8 = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkAccess() {
    const input = prompt("Geheimwort für diese Akte eingeben:");
    if (!input) return false;
    const inputHash = await getHash(input.toLowerCase().trim());
    if (inputHash === passwordHashes[pIdx]) return true;
    alert("ZUGRIFF VERWEIGERT!");
    return false;
}

// 3. Page Load: Cloud Daten ziehen
window.onload = async function() {
    let cloudData = { scores: {}, bios: {} };
    try {
        // 1. Daten aus der Cloud laden
        const res = await fetch(`https://stdoenerverbrechen.blob.core.windows.net/beweise/scores.json?${sasToken}`);
        if (res.ok) {
            cloudData = await res.json();
            console.log("Cloud-Daten geladen:", cloudData);
        }
    } catch (e) { 
        console.error("Cloud-Fehler:", e); 
    }

    // 2. Bio laden (nur aus Cloud)
    const savedBio = cloudData.bios ? cloudData.bios[pIdx] : "";
    document.getElementById('bio-input').value = savedBio || "";
    
    // 3. Profilbild laden
    document.getElementById('profile-img').src = `https://stdoenerverbrechen.blob.core.windows.net/beweise/pfp_${pIdx}.jpg?t=${new Date().getTime()}`;

    // 4. Verbrechen aus Cloud-Daten anzeigen
    const respVerbrechen = await fetch('verbrechen.json');
    const verbrechenListe = await respVerbrechen.json();
    
    const list = document.getElementById('user-crimes');
    list.innerHTML = ""; // Liste leeren

    verbrechenListe.forEach((item, vIdx) => {
        // PRÜFUNG: Schau direkt in das Cloud-Objekt statt in den LocalStorage
        const hatVerbrechenBegangen = cloudData.scores && 
                                      cloudData.scores[`p_${pIdx}`] && 
                                      cloudData.scores[`p_${pIdx}`][`v_${vIdx}`] === true;

        if (hatVerbrechenBegangen) {
            const li = document.createElement('li');
            li.className = "crime-item";
            
            // Beweis-URL (falls du Bilder in Azure speicherst, könntest du hier die URL generieren)
            const evidenceUrl = `https://stdoenerverbrechen.blob.core.windows.net/beweise/evidence_${pIdx}_${vIdx}.jpg`;

            li.innerHTML = `
                <b>${item[0]}</b> (${item[1]} Pkt)<br>
                <div style="margin-top:8px;">
                    <img src="${evidenceUrl}" onerror="this.style.display='none'" style="max-width:100%; border-radius:4px; margin-bottom:5px;">
                    <br>
                    <label class="upload-label">
                        📸 Beweis-Foto aktualisieren
                        <input type="file" accept="image/*" capture="camera" onchange="uploadEvidenceToAzure(this, ${vIdx})" style="display: none;">
                    </label>
                </div>
            `;
            list.appendChild(li);
        }
    });

    if (list.innerHTML === "") {
        list.innerHTML = "<li><i>Noch keine Verbrechen aktenkundig. Ein braver Bürger!</i></li>";
    }
};

// 4. Speicher-Funktionen
async function saveProfile() {
    const hatZugriff = await checkAccess();
    if (!hatZugriff) return;

    const neueBio = document.getElementById('bio-input').value;
    const azureUrl = `https://stdoenerverbrechen.blob.core.windows.net/beweise/scores.json?${sasToken}`;
    
    try {
        // Aktuellen Stand holen
        const response = await fetch(azureUrl);
        let data = { scores: {}, bios: {} };
        if (response.ok) data = await response.json();

        // Nur die Bio aktualisieren
        if (!data.bios) data.bios = {};
        data.bios[pIdx] = neueBio;
        data.last_updated = new Date().toISOString();

        // Upload
        const uploadRes = await fetch(azureUrl, {
            method: 'PUT',
            headers: {
                'x-ms-blob-type': 'BlockBlob',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });

        if (uploadRes.ok) {
            alert("Akte erfolgreich in der Cloud aktualisiert!");
        } else {
            throw new Error("Server-Antwort war nicht ok");
        }
    } catch (err) {
        alert("Fehler beim Speichern: " + err.message);
    }
}
