<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>SÜNDER-PROFIL | 2026</title>
    <style>
        body { background-color: #F5F5DC; font-family: 'Arial', sans-serif; text-align: center; padding: 20px; }
        .profile-card { 
            background: white; border: 3px double #800000; padding: 20px; 
            max-width: 500px; margin: auto; box-shadow: 5px 5px 0px #800000;
        }
        .pfp-container { width: 150px; height: 150px; background: #ddd; margin: 10px auto; border: 2px solid #000; overflow: hidden; }
        .pfp-container img { width: 100%; height: 100%; object-fit: cover; }
        textarea { width: 100%; height: 80px; margin-top: 10px; }
        .verbrechen-liste { text-align: left; margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
        .back-link { font-size: 12px; color: blue; text-decoration: none; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>

<a href="index.html" class="back-link"><< ZURÜCK ZUM DASHBOARD</a>

<div class="profile-card">
    <h1 id="user-name">Sünder Profil</h1>
    
    <div class="pfp-container" id="pfp-box">
        <img id="profile-img" src="https://web.archive.org/web/20090829103447/http://geocities.com/Tokyo/Pagoda/4844/guestbook.gif">
    </div>
    
    <input type="file" id="img-input" accept="image/*" style="font-size: 10px;">
    
    <h3>Meine Bio:</h3>
    <textarea id="bio-input" placeholder="Warum tust du das dem Döner an?"></textarea>
    <br>
    <button onclick="saveProfile()" style="margin-top:10px; background: #D2B48C;">PROFIL SPEICHERN</button>

    <div class="verbrechen-liste">
        <h3>Begangene Verbrechen:</h3>
        <ul id="user-crimes">
            </ul>
    </div>
</div>

<script src="logik.js"></script> <script>
const params = new URLSearchParams(window.location.search);
const pIdx = params.get('id');
const personenNamen = ["Person 1", "Person 2", "Person 3", "Person 4", "Person 5"];

// Den Namen der Person oben anzeigen
document.getElementById('user-name').innerText = "Akte: " + personenNamen[pIdx];

window.onload = function() {
    // Bio laden (Bleibt vorerst im localStorage, da wenig Text)
    const savedBio = localStorage.getItem('bio_' + pIdx);
    if(savedBio) document.getElementById('bio-input').value = savedBio;
    
    // Haupt-Profilbild laden (URL aus Cloud)
    const savedImg = localStorage.getItem('pfp_' + pIdx);
    if(savedImg) document.getElementById('profile-img').src = savedImg;

    // Verbrechen laden
    fetch('verbrechen.json')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('user-crimes');
            data.forEach((item, vIdx) => {
                // Prüfen, ob Checkbox im localStorage auf true steht
                if(localStorage.getItem(`cb_${vIdx}_${pIdx}`) === "true") {
                    const li = document.createElement('li');
                    li.style.marginBottom = "15px";
                    
                    const evidenceKey = `evidence_${pIdx}_${vIdx}`;
                    const savedEvidence = localStorage.getItem(evidenceKey); // Hier liegt jetzt die URL
                    
                    li.innerHTML = `
                        <b>${item[0]}</b> (${item[1]} Pkt)<br>
                        <div id="img_cont_${vIdx}" style="margin-top:5px;">
                            ${savedEvidence ? `<img src="${savedEvidence}" style="max-width:200px; border:2px solid #800000; box-shadow: 2px 2px 5px rgba(0,0,0,0.2);"><br>` : ''}
                            <input type="file" accept="image/*" capture="camera" onchange="uploadEvidenceToAzure(this, ${vIdx})" style="font-size:10px;">
                        </div>
                    `;
                    list.appendChild(li);
                }
            });
        });
};

// DIE NEUE TECHNIK: Upload direkt zu Azure
async function uploadEvidenceToAzure(input, vIdx) {
    if (!input.files || !input.files[0]) return;
    
    const file = input.files[0];
    const fileName = `evidence_${pIdx}_${vIdx}.jpg`; // Eindeutiger Name pro Verbrechen & Person
    const azureUrl = `https://stdoenerverbrechen.blob.core.windows.net/beweise/${fileName}?${sasToken}`;

    // Optisches Feedback
    input.disabled = true;
    console.log("Sende Beweis zu Azure...");

    try {
        const response = await fetch(azureUrl, {
            method: 'PUT',
            headers: {
                'x-ms-blob-type': 'BlockBlob',
                'Content-Type': file.type
            },
            body: file
        });

        if (response.ok) {
            // Wir speichern nur die URL (ohne SAS-Token) im localStorage
            const finalImageUrl = azureUrl.split('?')[0];
            localStorage.setItem(`evidence_${pIdx}_${vIdx}`, finalImageUrl);
            
            alert("Beweisfoto in der Cloud gesichert!");
            location.reload(); 
        } else {
            alert("Azure Fehler: " + response.statusText);
        }
    } catch (err) {
        console.error("Upload fehlgeschlagen:", err);
        alert("Upload fehlgeschlagen. Hast du Internet?");
    } finally {
        input.disabled = false;
    }
}

// Bio & Profilbild-Pfad speichern
function saveProfile() {
    const bio = document.getElementById('bio-input').value;
    localStorage.setItem('bio_' + pIdx, bio);
    alert("Profil-Akte aktualisiert!");
    saveToAzure(); // Triggert das Backup der scores.json, falls vorhanden
}
</script>

</body>
</html>
