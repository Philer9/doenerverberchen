<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>SÜNDER-PROFIL | 2026</title>
    <style>
        body { background-color: #F5F5DC; font-family: 'Arial', sans-serif; text-align: center; padding: 20px; color: #333; }
        .profile-card { 
            background: white; border: 3px double #800000; padding: 20px; 
            max-width: 500px; margin: auto; box-shadow: 5px 5px 0px #800000;
        }
        .pfp-container { 
            width: 150px; height: 150px; background: #ddd; margin: 10px auto; 
            border: 2px solid #000; overflow: hidden; position: relative;
        }
        .pfp-container img { width: 100%; height: 100%; object-fit: cover; }
        
        textarea { width: 100%; height: 100px; margin-top: 10px; border: 1px solid #ccc; padding: 5px; font-family: inherit; }
        .verbrechen-liste { text-align: left; margin-top: 20px; border-top: 2px solid #800000; padding-top: 10px; }
        .back-link { font-size: 14px; color: #800000; text-decoration: none; display: block; margin-bottom: 20px; font-weight: bold; }
        
        .btn-save { margin-top:15px; background: #800000; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-save:hover { background: #a00000; }
        
        .upload-label { font-size: 11px; font-weight: bold; cursor: pointer; color: #007bff; text-decoration: underline; display: inline-block; margin-top: 5px; }
        .crime-item { background: #fdfdfd; padding: 12px; border-left: 5px solid #800000; border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
    </style>
</head>
<body>

<a href="index.html" class="back-link"><< ZURÜCK ZUM DASHBOARD</a>

<div class="profile-card">
    <h1 id="user-name">Lade Akte...</h1>
    
    <div class="pfp-container">
        <img id="profile-img" src="">
    </div>
    
    <label class="upload-label">
        🖼️ Profilbild ändern
        <input type="file" id="pfp-input" accept="image/*" onchange="uploadPFP(this)" style="display: none;">
    </label>
    
    <h3>Über mich:</h3>
    <textarea id="bio-input" placeholder="Warum tust du das dem Döner an?"></textarea>
    <br>
    <button class="btn-save" onclick="saveProfile()">PROFIL IN CLOUD SPEICHERN</button>

    <div class="verbrechen-liste">
        <h3>Begangene Verbrechen:</h3>
        <ul id="user-crimes" style="list-style: none; padding: 0;">
            <li>Lade Sündenregister...</li>
        </ul>
    </div>
</div>

<script src="logik.js"></script> 
<script src ="profillogik.js"></script>
