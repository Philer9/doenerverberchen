<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>SÜNDER-PROFIL | 2026</title>
    <style>
        body { background-color: #F5F5DC; font-family: 'Arial', sans-serif; text-align: center; padding: 20px; color: #333; }
        .profile-card { 
            background: white; border: 3px double #800000; padding: 20px; 
            max-width: 500px; margin: auto; box-shadow: 5px 5px 0px #800000;
        }
        .pfp-container { 
            width: 150px; height: 150px; background: #ddd; margin: 10px auto; 
            border: 2px solid #000; overflow: hidden; position: relative;
        }
        .pfp-container img { width: 100%; height: 100%; object-fit: cover; }
        
        textarea { width: 100%; height: 100px; margin-top: 10px; border: 1px solid #ccc; padding: 5px; font-family: inherit; }
        .verbrechen-liste { text-align: left; margin-top: 20px; border-top: 2px solid #800000; padding-top: 10px; }
        .back-link { font-size: 14px; color: #800000; text-decoration: none; display: block; margin-bottom: 20px; font-weight: bold; }
        
        .btn-save { margin-top:15px; background: #800000; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-save:hover { background: #a00000; }
        
        .upload-label { font-size: 11px; font-weight: bold; cursor: pointer; color: #007bff; text-decoration: underline; display: inline-block; margin-top: 5px; }
        .crime-item { background: #fdfdfd; padding: 12px; border-left: 5px solid #800000; border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
    </style>
</head>
<body>

<a href="index.html" class="back-link"><< ZURÜCK ZUM DASHBOARD</a>

<div class="profile-card">
    <h1 id="user-name">Lade Akte...</h1>
    
    <div class="pfp-container">
        <img id="profile-img" src="">
    </div>
    
    <label class="upload-label">
        🖼️ Profilbild ändern
        <input type="file" id="pfp-input" accept="image/*" onchange="uploadPFP(this)" style="display: none;">
    </label>
    
    <h3>Meine Bio:</h3>
    <p style="font-size: 11px; color: #666; margin: 0;">(z.B. deine Vorräte an Pak Choi & Currypaste)</p>
    <textarea id="bio-input" placeholder="Warum tust du das dem Döner an?"></textarea>
    <br>
    <button class="btn-save" onclick="saveProfile()">PROFIL IN CLOUD SPEICHERN</button>

    <div class="verbrechen-liste">
        <h3>Begangene Verbrechen:</h3>
        <ul id="user-crimes" style="list-style: none; padding: 0;">
            <li>Lade Sündenregister...</li>
        </ul>
    </div>
</div>

<script src="logik.js"></script> 
<script>
// Konfiguration
const params = new URLSearchParams(window.location.search);
const pIdx = parseInt(params.get('id') || "0");
const personenNamen = ["Person 1", "Person 2", "Person 3", "Person 4", "Person 5"];
const passwordHashes = {
    0: "266497274070a98f9d0c6407f3542289c381665a587440660f545465e6383a1b", // petersilie
    1: "7514b4a1337d13d6cda65fe3d5bd1d476340c766666bea6fda9a6a9cd272accd", // erdnuss
    2: "02c3859663e26087b3e0c077b96e5d898517228a4788390b106263546a16174a", // zitronengras
    3: "6784d852ca2e6e3c08003117462c19e59275a596167823b16027376c962b3c22", // curry
    4: "0e2f5b3a4a75368a5202613589c368686e921d0092305cfcf8d63f0a3597816d"  // tofu
};

// Name setzen
document.getElementById('user-name').innerText = "Akte: " + personenNamen[pIdx];

// Hilfsfunktion für Passwort
async function getHash(str) {
    const msgUint8 = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkAccess() {
    const input = prompt("Geheimwort für diese Akte:");
    if (!input) return false;
    const inputHash = await getHash(input.toLowerCase().trim());
    if (inputHash === passwordHashes[pIdx]) return true;
    alert("ZUGRIFF VERWEIGERT!");
    return false;
}

// Initiales Laden
window.onload = async function() {
    console.log("Starte Profil-Ladeprozess für pIdx:", pIdx);
    let cloudData = { scores: {}, bios: {} };

    try {
        // 1. Scores laden
        const res = await fetch(`https://stdoenerverbrechen.blob.core.windows.net/beweise/scores.json?${sasToken}`);
        if (res.ok) {
            cloudData = await res.json();
            console.log("Cloud-Daten erfolgreich empfangen:", cloudData);
        }

        // 2. Bio anzeigen
        if (cloudData.bios && cloudData.bios[pIdx]) {
            document.getElementById('bio-input').value = cloudData.bios[pIdx];
        }

        // 3. Verbrechen Definitionen laden
        const respV = await fetch('verbrechen.json');
        const verbrechenListe = await respV.json();
        
        const listContainer = document.getElementById('user-crimes');
        listContainer.innerHTML = ""; // Platzhalter entfernen

        // 4. Abgleich mit der Struktur aus dem Screenshot
        const personKey = `p_${pIdx}`;
        const personScores = cloudData.scores ? cloudData.scores[personKey] : null;

        if (personScores) {
            verbrechenListe.forEach((item, vIdx) => {
                const verbrechenKey = `v_${vIdx}`;
                // WICHTIG: Prüfung auf echtes boolean true (wie im Screenshot zu sehen)
                if (personScores[verbrechenKey] === true) {
                    console.log("Verbrechen aktiv:", item[0]);
                    const li = document.createElement('li');
                    li.className = "crime-item";
                    
                    const evidenceUrl = `https://stdoenerverbrechen.blob.core.windows.net/beweise/evidence_${pIdx}_${vIdx}.jpg?${sasToken}&t=${new Date().getTime()}`;
                    
                    li.innerHTML = `
                        <b>${item[0]}</b> (${item[1]} Pkt)<br>
                        <div style="margin-top:8px;">
                            <img src="${evidenceUrl}" onerror="this.style.display='none'" style="max-width:100%; border-radius:4px; margin-bottom:5px;">
                            <br>
                            <label class="upload-label">
                                📸 Beweis-Foto hochladen
                                <input type="file" accept="image/*" capture="camera" onchange="uploadEvidence(this, ${vIdx})" style="display: none;">
                            </label>
                        </div>
                    `;
                    listContainer.appendChild(li);
                }
            });
        }

        if (listContainer.innerHTML === "") {
            listContainer.innerHTML = "<li><i>Keine aktiven Verbrechen in der Akte gefunden.</i></li>";
        }

    } catch (e) {
        console.error("KRITISCHER FEHLER beim Laden des Profils:", e);
        document.getElementById('user-crimes').innerHTML = "<li><font color='red'>Fehler beim Laden der Daten!</font></li>";
    }

    // Profilbild separat laden
    document.getElementById('profile-img').src = `https://stdoenerverbrechen.blob.core.windows.net/beweise/pfp_${pIdx}.jpg?${sasToken}&t=${new Date().getTime()}`;
};
</script>
