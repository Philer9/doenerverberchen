<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>REZEPT-ANSICHT | Döner-Verbrechen</title>
    <style>
        body { background-color: #fdf5e6; font-family: 'Times New Roman', serif; padding: 20px; }
        .book-page { 
            background: white; 
            max-width: 600px; 
            margin: auto; 
            padding: 40px; 
            border: 1px solid #d2b48c; 
            box-shadow: 10px 10px 0px #d2b48c;
            background-image: radial-gradient(#eee 1px, transparent 1px);
            background-size: 20px 20px;
        }
        h1 { font-family: 'Comic Sans MS'; color: #8b4513; border-bottom: 2px solid #8b4513; margin-top: 0; }
        .stamp { 
            border: 4px solid red; color: red; font-weight: bold; 
            display: inline-block; padding: 5px; transform: rotate(-5deg); 
            font-size: 18px; margin-bottom: 20px; text-transform: uppercase;
        }
        h3 { border-left: 5px solid #d2b48c; padding-left: 10px; color: #555; }
        .content-text { line-height: 1.6; font-size: 16px; }
    </style>
</head>
<body>

<div class="book-page">
    <a href="index.html" style="font-size: 11px; color: blue; text-decoration: none;"><< ZURÜCK ZUR ÜBERSICHT</a>
    
    <p align="right" id="danger-stamp" class="stamp">LÄDT...</p>
    
    <h1 id="titel">Rezeptname</h1>

    <h3>Benötigte Zutaten:</h3>
    <p id="zutaten-liste" class="content-text"></p>

    <h3>Zubereitungsschritte:</h3>
    <p id="zubereitung-text" class="content-text"></p>

    <hr style="border: 0; border-top: 1px double #d2b48c; margin-top: 40px;">
    <p align="center" style="font-size: 12px; color: #666;">
        <i>"Guten Appetit? Wohl kaum." - Chefkoch Döner-Verbrechen (2026)</i>
    </p>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const fullText = params.get('text') || "Keine Info | Keine Info";
    
    // Wir trennen Zutaten und Zubereitung am "|" Zeichen
    const parts = fullText.split('|');
    const zutaten = parts[0] ? parts[0].trim() : "Dönerfleisch";
    const methode = parts[1] ? parts[1].trim() : "Keine Anleitung vorhanden.";

    document.getElementById('titel').innerText = params.get('name');
    document.getElementById('zutaten-liste').innerText = zutaten;
    document.getElementById('zubereitung-text').innerText = methode;
    
    const lvl = parseInt(params.get('lvl'));
    const stamp = document.getElementById('danger-stamp');
    if(lvl >= 8) {
        stamp.innerText = "Kriegsverbrechen";
        stamp.style.color = "red";
        stamp.style.borderColor = "red";
    } else {
        stamp.innerText = "Ordnungswidrigkeit";
        stamp.style.color = "orange";
        stamp.style.borderColor = "orange";
    }
</script>

</body>
</html>
